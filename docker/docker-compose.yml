name: groundcontrol-neurai

services:
  # ─── Neurai full nodes (internal-only) ───────────────────────────────────
  neurai-mainnet:
    build: ./node-mainnet
    container_name: groundcontrol-neurai-mainnet
    restart: unless-stopped
    volumes:
      - mainnet_data:/data
    networks:
      - groundcontrol-neurai-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "neurai-cli", "-datadir=/data", "getblockchaininfo"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  neurai-testnet:
    build: ./node-testnet
    container_name: groundcontrol-neurai-testnet
    restart: unless-stopped
    volumes:
      - testnet_data:/data
    networks:
      - groundcontrol-neurai-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "neurai-cli", "-datadir=/data", "getblockchaininfo"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── MariaDB (internal-only) ─────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: groundcontrol-neurai-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpw
      MARIADB_DATABASE: groundcontrol
      MARIADB_USER: groundcontrol
      MARIADB_PASSWORD: secret
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - groundcontrol-neurai-net

  # ─── GroundControl HTTP API — THE ONLY SERVICE EXPOSING A HOST PORT ──────
  web:
    build: ..
    container_name: groundcontrol-neurai-web
    restart: unless-stopped
    depends_on:
      - mariadb
    env_file: ../.env
    environment:
      JAWSDB_MARIA_URL: mysql://groundcontrol:secret@mariadb:3306/groundcontrol
    command: npm start
    ports:
      - "3001:3001"
    networks:
      - groundcontrol-neurai-net

  # ─── Chain watchers: block + mempool per chain (internal-only) ───────────
  worker-blockprocessor-mainnet:
    build: ..
    container_name: groundcontrol-neurai-worker-block-mainnet
    restart: unless-stopped
    depends_on:
      - mariadb
      - neurai-mainnet
    env_file: ../.env
    environment:
      JAWSDB_MARIA_URL: mysql://groundcontrol:secret@mariadb:3306/groundcontrol
      NEURAI_RPC: http://neurai:changeme@neurai-mainnet:19101
      NEURAI_ZMQ: tcp://neurai-mainnet:28332
      CHAIN: mainnet
    command: npm run worker-blockprocessor
    networks:
      - groundcontrol-neurai-net

  worker-processmempool-mainnet:
    build: ..
    container_name: groundcontrol-neurai-worker-mempool-mainnet
    restart: unless-stopped
    depends_on:
      - mariadb
      - neurai-mainnet
    env_file: ../.env
    environment:
      JAWSDB_MARIA_URL: mysql://groundcontrol:secret@mariadb:3306/groundcontrol
      NEURAI_RPC: http://neurai:changeme@neurai-mainnet:19101
      NEURAI_ZMQ: tcp://neurai-mainnet:28332
      CHAIN: mainnet
    command: npm run worker-processmempool
    networks:
      - groundcontrol-neurai-net

  worker-blockprocessor-testnet:
    build: ..
    container_name: groundcontrol-neurai-worker-block-testnet
    restart: unless-stopped
    depends_on:
      - mariadb
      - neurai-testnet
    env_file: ../.env
    environment:
      JAWSDB_MARIA_URL: mysql://groundcontrol:secret@mariadb:3306/groundcontrol
      NEURAI_RPC: http://neurai:changeme@neurai-testnet:19101
      NEURAI_ZMQ: tcp://neurai-testnet:28332
      CHAIN: testnet
    command: npm run worker-blockprocessor
    networks:
      - groundcontrol-neurai-net

  worker-processmempool-testnet:
    build: ..
    container_name: groundcontrol-neurai-worker-mempool-testnet
    restart: unless-stopped
    depends_on:
      - mariadb
      - neurai-testnet
    env_file: ../.env
    environment:
      JAWSDB_MARIA_URL: mysql://groundcontrol:secret@mariadb:3306/groundcontrol
      NEURAI_RPC: http://neurai:changeme@neurai-testnet:19101
      NEURAI_ZMQ: tcp://neurai-testnet:28332
      CHAIN: testnet
    command: npm run worker-processmempool
    networks:
      - groundcontrol-neurai-net

  # ─── Chain-agnostic FCM/APNs dispatcher (internal-only) ──────────────────
  worker-sender:
    build: ..
    container_name: groundcontrol-neurai-worker-sender
    restart: unless-stopped
    depends_on:
      - mariadb
    env_file: ../.env
    environment:
      JAWSDB_MARIA_URL: mysql://groundcontrol:secret@mariadb:3306/groundcontrol
    command: npm run worker-sender
    networks:
      - groundcontrol-neurai-net

volumes:
  mainnet_data:
  testnet_data:
  mariadb_data:

networks:
  groundcontrol-neurai-net:
    name: groundcontrol-neurai-net
    driver: bridge
