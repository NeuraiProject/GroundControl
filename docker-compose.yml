# Stack for groundcontrol-neurai. Watches BOTH mainnet and testnet in a single
# instance: dedicated block/mempool worker per chain, but a shared web/API,
# database, and sender. Drop a `.env` next to this file (start from
# `.env.example`) before running.
#
#   docker compose up --build
#
# Then point the wallet's "Settings → Notifications → developer panel" URI at
# https://groundcontrol.<your-domain>  (or http://<host-ip>:3001 for local dev).

services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpw
      MARIADB_DATABASE: groundcontrol
      MARIADB_USER: groundcontrol
      MARIADB_PASSWORD: secret
    volumes:
      - groundcontrol-mariadb-data:/var/lib/mysql

  web:
    build: .
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      JAWSDB_MARIA_URL: mysql://groundcontrol:secret@mariadb:3306/groundcontrol
      APNS_P8: ${APNS_P8}
      APNS_P8_KID: ${APNS_P8_KID}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID}
      APNS_TOPIC: ${APNS_TOPIC}
      GOOGLE_KEY_FILE: ${GOOGLE_KEY_FILE}
      GOOGLE_PROJECT_ID: ${GOOGLE_PROJECT_ID}
      VERBOSE: ${VERBOSE}
    command: npm start
    ports:
      - "3001:3001"

  # ---- Chain watchers: one block + one mempool worker per chain ------------

  worker-blockprocessor-mainnet:
    build: .
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      JAWSDB_MARIA_URL: mysql://groundcontrol:secret@mariadb:3306/groundcontrol
      NEURAI_RPC: ${NEURAI_RPC_MAINNET}
      CHAIN: mainnet
      VERBOSE: ${VERBOSE}
    command: npm run worker-blockprocessor

  worker-processmempool-mainnet:
    build: .
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      JAWSDB_MARIA_URL: mysql://groundcontrol:secret@mariadb:3306/groundcontrol
      NEURAI_RPC: ${NEURAI_RPC_MAINNET}
      CHAIN: mainnet
      VERBOSE: ${VERBOSE}
    command: npm run worker-processmempool

  worker-blockprocessor-testnet:
    build: .
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      JAWSDB_MARIA_URL: mysql://groundcontrol:secret@mariadb:3306/groundcontrol
      NEURAI_RPC: ${NEURAI_RPC_TESTNET}
      CHAIN: testnet
      VERBOSE: ${VERBOSE}
    command: npm run worker-blockprocessor

  worker-processmempool-testnet:
    build: .
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      JAWSDB_MARIA_URL: mysql://groundcontrol:secret@mariadb:3306/groundcontrol
      NEURAI_RPC: ${NEURAI_RPC_TESTNET}
      CHAIN: testnet
      VERBOSE: ${VERBOSE}
    command: npm run worker-processmempool

  # ---- Single sender (chain-agnostic — pulls from the shared SendQueue) ----

  worker-sender:
    build: .
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      JAWSDB_MARIA_URL: mysql://groundcontrol:secret@mariadb:3306/groundcontrol
      APNS_P8: ${APNS_P8}
      APNS_P8_KID: ${APNS_P8_KID}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID}
      APNS_TOPIC: ${APNS_TOPIC}
      GOOGLE_KEY_FILE: ${GOOGLE_KEY_FILE}
      GOOGLE_PROJECT_ID: ${GOOGLE_PROJECT_ID}
      VERBOSE: ${VERBOSE}
    command: npm run worker-sender

volumes:
  groundcontrol-mariadb-data:
