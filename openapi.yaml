openapi: 3.0.0
info:
  title: GroundControl push server API for NeuraiWallet
  description: Push notifications server that watches the Neurai chain for incoming on-chain payments and dispatches FCM/APNs pushes to subscribed wallets.
  version: 0.0.13
servers:
  - url: http://localhost:3001
  - url: https://groundcontrol.neurai.org
paths:
  /majorTomToGroundControl:
    post:
      summary: "Associate Neurai on-chain addresses / txids you wish to be notified about with a specific push token. Token serves as unique identifier of a device/user. Also, OS of the token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                addresses:
                  type: array
                  items:
                    type: string
                txids:
                  type: array
                  items:
                    type: string
                token:
                  type: string
                os:
                  type: string
      responses:
        "201":
          description: Created

  /unsubscribe:
    post:
      summary: "Reverse of /majorTomToGroundControl. Removes the given addresses/txids from the device's subscription set."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                addresses:
                  type: array
                  items:
                    type: string
                txids:
                  type: array
                  items:
                    type: string
                token:
                  type: string
                os:
                  type: string
      responses:
        "201":
          description: Created

  /ping:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfo"

  /getTokenConfiguration:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                os:
                  type: string
      summary: "Returns levels of notifications user currently subscribed to"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenConfiguration"

  /setTokenConfiguration:
    post:
      summary: "Sets levels of notifications user is subscribed to; also saves some user info, like lang or app version"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/TokenConfiguration"
                - type: object
                  required:
                    - token
                    - os
                  properties:
                    token:
                      type: "string"
                    os:
                      type: "string"
      responses:
        "200":
          description: OK

  /enqueue:
    post:
      summary: "Puts push in send queue. Push body should be any descendant of `/components/schemas/PushNotificationBase`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/PushNotificationOnchainAddressGotPaid"
                - $ref: "#/components/schemas/PushNotificationOnchainAddressGotUnconfirmedTransaction"
                - $ref: "#/components/schemas/PushNotificationTxidGotConfirmed"
      responses:
        "200":
          description: OK

components:
  schemas:
    ServerInfo:
      type: "object"
      properties:
        name:
          type: "string"
        description:
          type: "string"
        version:
          type: "string"
        uptime:
          type: "number"
        last_processed_block:
          type: "number"
        send_queue_size:
          type: "number"
        sent_24h:
          type: "number"

    NotificationLevel:
      type: string
      enum:
        - transactions
        - news
        - price
        - tips

    TokenConfiguration:
      type: "object"
      properties:
        level_all:
          type: "boolean"
        level_transactions:
          type: "boolean"
        level_news:
          type: "boolean"
        level_price:
          type: "boolean"
        level_tips:
          type: "boolean"
        lang:
          type: "string"
        app_version:
          type: "string"

    PushNotificationBase:
      description: payload for push notification delivered to phone
      type: object
      required:
        - type
        - level
        - os
        - token
      properties:
        "type":
          type: "integer"
          enum:
            - 2
            - 3
            - 4
            - 5
          description: >
            type:
             * `2` - New transaction to one of your addresses
             * `3` - New unconfirmed transaction to one of your addresses
             * `4` - Transaction confirmed
             * `5` - Arbitrary text message
        "token":
          type: "string"
        "os":
          type: "string"
          enum:
            - "android"
            - "ios"
        badge:
          type: "integer"
        level:
          $ref: "#/components/schemas/NotificationLevel"

    PushNotificationOnchainAddressGotPaid:
      allOf: # Combines PushNotificationBase and the inline model
        - $ref: "#/components/schemas/PushNotificationBase"
        - type: object
          required:
            - address
            - sat
            - txid
          properties:
            type:
              type: "integer"
              enum: [2]
            level:
              type: "string"
              enum: ["transactions"]
            sat:
              type: "integer"
              description: "amount in the smallest XNA unit (1 XNA = 100,000,000 sat)"
            address:
              type: "string"
              description: "user's Neurai on-chain address that has an incoming transaction"
            txid:
              type: "string"
              description: "txid of the transaction where this address is one of the outputs"

    PushNotificationOnchainAddressGotUnconfirmedTransaction:
      allOf: # Combines PushNotificationBase and the inline model
        - $ref: "#/components/schemas/PushNotificationBase"
        - type: object
          required:
            - address
            - sat
            - txid
          properties:
            type:
              type: "integer"
              enum: [3]
            level:
              type: "string"
              enum: ["transactions"]
            sat:
              type: "integer"
              description: "amount in the smallest XNA unit (1 XNA = 100,000,000 sat)"
            address:
              type: "string"
              description: "user's Neurai on-chain address that has an incoming transaction"
            txid:
              type: "string"
              description: "txid of the transaction where this address is one of the outputs"

    PushNotificationTxidGotConfirmed:
      allOf: # Combines PushNotificationBase and the inline model
        - $ref: "#/components/schemas/PushNotificationBase"
        - type: object
          required:
            - txid
          properties:
            type:
              type: "integer"
              enum: [4]
            level:
              type: "string"
              enum: ["transactions"]
            txid:
              type: "string"
              description: "txid of the transaction that got confirmed"

    PushNotificationMessage:
      allOf: # Combines PushNotificationBase and the inline model
        - $ref: "#/components/schemas/PushNotificationBase"
        - type: object
          required:
            - text
          properties:
            type:
              type: "integer"
              enum: [5]
            text:
              type: "string"
              description: "custom text displayed on the push notification bubble"
